interface:
  display_name: "PinchTab Browser"
  short_description: "三层链路中的轻量浏览器层，必要时交回 Scrapling 或升级 Playwright-Ext"
  default_prompt: "使用 $pinchtab 作为 Scrapling -> PinchTab -> Playwright 的轻量浏览器层：优先通过 PinchTab 完成导航、快照、正文读取和轻交互，并在关键动作后校验 URL、标题、文本或快照结果；若任务本质是结构化提取或批量抓取，交回 Scrapling；若需要高可靠交互、稳定 ref、复杂导航或严格状态校验，请切到 playwright-ext。回复中必须说明最终使用层级与切换原因。"

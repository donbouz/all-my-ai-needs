runtime_version: 1
skill: bird-twitter-bookmarks
platform: codex

sync_paths:
  - SKILL.md
  - README.md
  - setup.sh
  - skill.config.json
  - runtime.yaml
  - scripts

dependencies:
  commands:
    - node
    - npm
    - ft
    - python3
    - sqlite3

manual_steps:
  - 安装 fieldtheory：HTTP_PROXY=http://127.0.0.1:7897 HTTPS_PROXY=http://127.0.0.1:7897 npm install -g fieldtheory
  - 浏览器中登录 X：打开 `x.com` 并保持对应 Chrome profile 可读
  - 若 `ft sync` 报 `fetch failed`，增加 `NODE_USE_ENV_PROXY=1` 后重试

verify:
  - node --version
  - npm --version
  - ft --version
  - NODE_USE_ENV_PROXY=1 HTTP_PROXY=http://127.0.0.1:7897 HTTPS_PROXY=http://127.0.0.1:7897 ft path
  - python3 platforms/codex/skills/bird-twitter-bookmarks/scripts/bookmark_l2_labels.py --help
